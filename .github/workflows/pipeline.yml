name: Spiral Slayer CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Dar permisos a scripts
        run: chmod +x scripts/*.sh

      - name: Generar entorno de liberación
        run: ./scripts/setup_release_env.sh

      - name: Ejecutar pruebas del entorno de liberación
        run: ./scripts/test_release.sh

      - name: Generar despliegue
        run: ./scripts/deploy_release.sh

      - name: Subir artefactos
        uses: actions/upload-artifact@v4
        with:
          name: spiral-slayer-build
          path: exports/